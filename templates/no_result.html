<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Doctors Found</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fef6ec;
        }
        
        nav {
            background-color: #ae4102;
        }
        
        .navbar .nav-link,
        .navbar-brand {
            color: #fff !important;
            font-weight: 500;
        }
        
        .navbar .nav-link:hover {
            color: #ffe8dc !important;
        }
        
        .navbar .btn-outline-success {
            color: #fff;
            border-color: #fff;
        }
        
        .navbar .btn-outline-success:hover {
            background-color: #54b435;
            border-color: #54b435;
        }
        
        .container-main {
            width: 100%;
            min-height: 600px;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }
        
        h2 {
            color: #ae4102;
            margin-top: 20px;
        }
        
        p {
            color: #333;
            font-size: 1.1rem;
        }
        
        .lottie-container {
            width: 300px;
            height: 300px;
            margin-bottom: 20px;
        }
        
        .btn-home {
            background-color: #ae4102;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
        }
        
        .btn-home:hover {
            background-color: #ff7b54;
        }
        
        footer {
            background-color: #ae4102;
            color: white;
            text-align: center;
            padding: 12px 0;
            margin-top: 30px;
        }
    </style>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>

<body>
    <!-- Navbar same as dashboard -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" href="#">🐾 FurHelp Dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Appointments</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main container -->
    <div class="container-main">
        <div class="lottie-container">
            <lottie-player src="https://assets10.lottiefiles.com/packages/lf20_x62chJ.json" background="transparent" speed="1" style="width:300px; height:300px;" loop autoplay>
            </lottie-player>
        </div>
        <h2>Oops! No doctors found 🐱</h2>
        <p>Sorry, we don’t have any doctors available in <strong>{{ city }}</strong> at the moment.</p>
        <a href="{{ url_for('dashboard') }}" class="btn-home">Go Back to Dashboard</a>
    </div>

    <!-- Footer same as dashboard -->
    <footer>
        <p>© 2025 FurHelp. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
</body>

</html>
